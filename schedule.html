<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>スケジュール作成</title>
    <link rel="stylesheet" href="schedule.css" />
  </head>
  <body>
    <main class="container">

      <header class="header card">
        <h1>スケジュール作成</h1>
        <p>施術条件をもとに、大枠 → 中枠 → 小枠の順で手動配分します。</p>
      </header>

      <section class="card" aria-labelledby="condition-title">
        <h2 id="condition-title">条件サマリー</h2>
        <div id="conditionSummary" class="summary-grid"></div>
      </section>

      <section class="card" aria-labelledby="frame-preview-title">
        <h2 id="frame-preview-title">大枠配分プレビュー</h2>
        <div id="frameBar" class="stacked-bar" role="img" aria-label="大枠配分の比率"></div>
        <div id="frameLegend" class="legend"></div>
      </section>

      <section class="card" aria-labelledby="editor-title">
        <h2 id="editor-title">3層編集</h2>
        <div class="editor-grid">
          <section class="panel" aria-labelledby="frame-panel-title">
            <div class="panel-head">
              <h3 id="frame-panel-title">大枠</h3>
              <button id="addFrameBtn" type="button" class="ghost">+ 追加</button>
            </div>
            <p class="help">大枠を選択すると中枠を編集できます。</p>
            <div id="frameList" class="list"></div>
          </section>

          <section class="panel" aria-labelledby="block-panel-title">
            <div class="panel-head">
              <h3 id="block-panel-title">中枠</h3>
              <button id="addBlockBtn" type="button" class="ghost">+ 追加</button>
            </div>
            <p id="blockGuard" class="guard">先に大枠を選択してください。</p>
            <div id="blockList" class="list"></div>
          </section>

          <section class="panel" aria-labelledby="unit-panel-title">
            <div class="panel-head">
              <h3 id="unit-panel-title">小枠</h3>
              <button id="addUnitBtn" type="button" class="ghost">+ 追加</button>
            </div>
            <p id="unitGuard" class="guard">先に中枠を選択してください。</p>
            <div id="unitList" class="list"></div>
          </section>
        </div>
      </section>

      <section class="card" aria-labelledby="warning-title">
        <h2 id="warning-title">下部サマリー</h2>
        <div id="totals" class="totals"></div>
        <ul id="warningList" class="warning-list"></ul>
        <button id="confirmButton" type="button">この内容で確定</button>
        <p id="confirmMessage" class="confirm-message" aria-live="polite"></p>
      </section>

      <details class="card dev-preview">
        <summary>開発用: 次画面用 payload</summary>
        <pre id="payloadPreview"></pre>
      </details>
    </main>

    <script src="infra/storage.js"></script>
    <script src="schedule.js"></script>
  </body>
</html>
