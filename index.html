<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>施術条件入力</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>施術条件の入力</h1>
        <p>この画面では施術条件のみ設定します。</p>
      </header>

      <section class="card" aria-labelledby="form-title">
        <h2 id="form-title">施術条件</h2>

        <div class="field">
          <label for="menuSelect">メニュー <span class="required">必須</span></label>
          <select id="menuSelect" name="menuId">
            <option value="">選択してください</option>
          </select>
          <p id="menuError" class="error" aria-live="polite"></p>
        </div>

        <div class="field">
          <p class="field-label" id="durationLabel">総時間（分） <span class="required">必須</span></p>

          <select id="durationSelect" name="durationPreset" class="hidden" disabled aria-labelledby="durationLabel">
            <option value="">先にメニューを選択してください</option>
          </select>

          <input
            id="durationCustom"
            name="totalDurationMin"
            class="hidden"
            type="number"
            min="1"
            step="1"
            inputmode="numeric"
            placeholder="1以上の整数（分）"
            disabled
            aria-labelledby="durationLabel"
          />

          <p id="durationHelp" class="help"></p>
          <p id="durationError" class="error" aria-live="polite"></p>
        </div>

        <fieldset class="field">
          <legend>重点部位（任意・複数選択可）</legend>
          <div id="focusAreaList" class="checkbox-grid"></div>
        </fieldset>

        <fieldset class="field split-fieldset">
          <legend id="splitLegend">左右を分ける</legend>
          <div class="split-row">
            <p id="splitDescription" class="split-description">左右を別々にスケジュールします。</p>
            <label class="switch" for="splitToggle" aria-labelledby="splitLegend splitDescription">
              <input id="splitToggle" type="checkbox" role="switch" />
              <span class="slider" aria-hidden="true"></span>
            </label>
          </div>
        </fieldset>

        <button id="nextButton" type="button" disabled>次へ</button>
        <p id="formMessage" class="form-message" aria-live="polite"></p>
      </section>
    </main>

    <script src="infra/storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
