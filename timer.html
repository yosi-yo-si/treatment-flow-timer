<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>施術タイマー</title>
    <link rel="stylesheet" href="timer.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>施術タイマー</h1>
        <p id="timerStatus" class="status" aria-live="polite"></p>

        <div class="current">
          <p class="label">現在の枠</p>
          <p id="currentName" class="name">-</p>
          <p id="currentRemain" class="remain">00:00</p>
        </div>

        <div class="bar-wrap" aria-hidden="true">
          <div id="progressBar" class="bar"></div>
        </div>

        <div class="actions">
          <button id="startPauseBtn" type="button">開始</button>
          <button id="nextBtn" type="button" class="ghost">次へ</button>
          <button id="resetBtn" type="button" class="ghost">リセット</button>
        </div>

        <h2>実行キュー</h2>
        <ol id="queueList" class="queue"></ol>

        <div class="links">
          <a href="schedule.html">配分編集に戻る</a>
        </div>
      </section>
    </main>

    <script src="timer.js"></script>
  </body>
</html>
